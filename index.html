<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты всё сможешь ❤️</title>
    <style>
        :root {
            --bg-color: #FFF0F5;
            --card-bg: #FFFFFF;
            --accent: #FF9FF3;
            --text: #2D3436;
            --btn-primary: #FF6B81;
            --btn-secondary: #FDCB6E;
            --listen-btn: #FF7675;
            --listen-hover: #d63031;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Анимация заголовка */
        h1 {
            text-align: center;
            color: var(--btn-primary);
            font-size: 28px;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(20px);
            animation: floatIn 1s forwards 0.2s;
        }
        @keyframes floatIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .letter {
            display: inline-block;
            animation: popIn 0.6s forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(0deg); }
            100% { transform: scale(1); opacity: 1; }
        }

        .subtitle {
            text-align: center;
            color: #878787;
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* Кнопки тем (горизонтальное меню) */

            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
        }
